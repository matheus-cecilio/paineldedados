version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/app
      - REDIS_URL=redis://redis:6379/0
      - BACKEND_CORS_ORIGINS=http://localhost:8501,http://localhost:8000
      - API_AUTH_BYPASS=true
      - SUPABASE_JWKS_URL=
      - LOG_LEVEL=INFO
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A app.workers.celery_app.celery worker -l info
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/app
      - REDIS_URL=redis://redis:6379/0
      - API_AUTH_BYPASS=true
    depends_on:
      - backend
      - redis

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    environment:
      - BACKEND_API_URL=http://backend:8000
    depends_on:
      - backend
    ports:
      - "8501:8501"

volumes:
  db_data:
