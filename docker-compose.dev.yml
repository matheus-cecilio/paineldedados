version: '3.8'

services:
  db:
    image: postgres:15
    container_name: sales_db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=appdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:7
    container_name: sales_redis

  backend:
    build: ../backend
    container_name: sales_backend
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    env_file:
      - ../.env

volumes:
  postgres_data: